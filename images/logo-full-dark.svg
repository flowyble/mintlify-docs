<svg width="1682" height="367" viewBox="0 0 1682 367" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="icon-bg" x1="60" y1="44" x2="340" y2="324" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#8b6cc7"/>
      <stop offset="100%" stop-color="#6f42c1"/>
    </linearGradient>
    <linearGradient id="text-grad" x1="380" y1="68" x2="1062" y2="220" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#a78bda"/>
      <stop offset="100%" stop-color="#8b6cc7"/>
    </linearGradient>
    <filter id="icon-shadow" x="-10%" y="-5%" width="125%" height="130%">
      <feDropShadow dx="0" dy="8" stdDeviation="14" flood-color="#6f42c1" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1682" height="367" fill="#0d0b14"/>

  <!-- Icon -->
  <rect x="60" y="44" width="280" height="280" rx="60" fill="url(#icon-bg)" filter="url(#icon-shadow)"/>
  <text x="200" y="184" text-anchor="middle" dominant-baseline="central"
        font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-weight="800" font-size="160" fill="#e8e4f0">F</text>

  <!-- Flowyble — gradient purple -->
  <text x="380" y="76" dominant-baseline="hanging"
        font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-weight="700" font-size="152" fill="url(#text-grad)">Flowyble</text>

  <!-- AUTOMATION -->
  <text x="384" y="236" dominant-baseline="hanging"
        font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-weight="600" font-size="61" fill="#8a7fa0" letter-spacing="0.3em">AUTOMATION</text>
</svg>
